name: Update signal-cli package

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check for updates
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.check.outputs.latest }}
      current: ${{ steps.check.outputs.current }}
      update_available: ${{ steps.check.outputs.update_available }}
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh api repos/AsamK/signal-cli/releases/latest --jq '.tag_name')
          CURRENT=$(cat .signal-cli-version 2>/dev/null || echo "none")
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Latest: $LATEST | Current: $CURRENT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
          fi

  build-and-publish:
    name: Build and publish signal-cli .deb
    needs: [check]
    if: needs.check.outputs.update_available == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download signal-cli tarball
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        run: |
          CLEAN_VERSION="${VERSION#v}"
          TARBALL="signal-cli-${CLEAN_VERSION}.tar.gz"
          URL="https://github.com/AsamK/signal-cli/releases/download/${VERSION}/${TARBALL}"
          echo "Downloading ${URL}..."
          curl -fsSL -o "${TARBALL}" "${URL}"
          mkdir -p signal-cli-dist
          tar -xzf "${TARBALL}" --strip-components=1 -C signal-cli-dist
          echo "Extracted $(find signal-cli-dist -type f | wc -l) files"
          ls signal-cli-dist/bin/

      - name: Inject aarch64 native library
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LIBSIGNAL_JAR=$(ls signal-cli-dist/lib/libsignal-client-*.jar)
          LIBSIGNAL_VERSION=$(basename "$LIBSIGNAL_JAR" | sed 's/libsignal-client-//; s/\.jar//')
          echo "Bundled libsignal-client version: ${LIBSIGNAL_VERSION}"

          # Skip if aarch64 lib already present
          if unzip -l "$LIBSIGNAL_JAR" | grep -q "libsignal_jni_aarch64.so"; then
            echo "aarch64 native lib already in JAR, skipping"
            exit 0
          fi

          # Try exact version, then fall back to nearest available
          ASSET="libsignal_jni.so-v${LIBSIGNAL_VERSION}-aarch64-unknown-linux-gnu.tar.gz"
          URL="https://github.com/exquo/signal-libs-build/releases/download/libsignal_v${LIBSIGNAL_VERSION}/${ASSET}"

          if ! curl -fsSL -o native-lib.tar.gz "${URL}" 2>/dev/null; then
            echo "Exact version not available, finding nearest aarch64 build..."
            FALLBACK_TAG=$(gh api repos/exquo/signal-libs-build/releases --paginate \
              --jq '[.[] | select(.assets[]?.name | contains("aarch64-unknown-linux-gnu"))] | .[0].tag_name')
            FALLBACK_VERSION="${FALLBACK_TAG#libsignal_v}"
            echo "::warning::Using fallback libsignal native v${FALLBACK_VERSION} (wanted v${LIBSIGNAL_VERSION})"
            ASSET="libsignal_jni.so-v${FALLBACK_VERSION}-aarch64-unknown-linux-gnu.tar.gz"
            curl -fsSL -o native-lib.tar.gz \
              "https://github.com/exquo/signal-libs-build/releases/download/${FALLBACK_TAG}/${ASSET}"
          fi

          tar -xzf native-lib.tar.gz
          mv libsignal_jni.so libsignal_jni_aarch64.so
          zip -j "$LIBSIGNAL_JAR" libsignal_jni_aarch64.so
          echo "Injected libsignal_jni_aarch64.so into $(basename $LIBSIGNAL_JAR)"
          rm -f native-lib.tar.gz libsignal_jni_aarch64.so

      - name: Install nfpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.45.0/nfpm_2.45.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin nfpm

      - name: Build .deb
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        run: |
          CLEAN_VERSION="${VERSION#v}"
          SIGNAL_CLI_VERSION="${CLEAN_VERSION}" nfpm package \
            --config deploy/signal-cli-nfpm.yaml \
            --packager deb \
            --target .
          ls -la signal-cli_*.deb
          # Fail if .deb is suspiciously small (< 1MB)
          SIZE=$(stat --format=%s signal-cli_*.deb)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: .deb is only ${SIZE} bytes — expected >1MB"
            exit 1
          fi

      - name: Check out gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Publish to APT repository
        run: |
          mkdir -p gh-pages/apt/pool/main gh-pages/apt/dists/stable/main/binary-arm64
          cp signal-cli_*.deb gh-pages/apt/pool/main/

          cd gh-pages/apt

          # Generate Packages index
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          # Generate Release file
          cd dists/stable
          apt-ftparchive release \
            -o APT::FTPArchive::Release::Suite=stable \
            -o APT::FTPArchive::Release::Codename=stable \
            -o APT::FTPArchive::Release::Architectures=arm64 \
            . > Release

          # Sign Release
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "apt: publish signal-cli ${{ needs.check.outputs.latest }}"
          git push

      - name: Update version tracker
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        run: |
          cd ${{ github.workspace }}
          echo "${VERSION}" > .signal-cli-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .signal-cli-version
          git commit -m "chore: update .signal-cli-version to ${VERSION}"
          git push
