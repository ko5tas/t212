name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests with race detector
        run: go test -race ./...

  release:
    name: Build .deb and publish release
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cross-compile for linux/arm64
        run: GOARCH=arm64 GOOS=linux go build -o t212-arm64 ./cmd/t212
      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.45.0
      - name: Build .deb
        run: VERSION=${{ github.ref_name }} nfpm package --packager deb --target .
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            t212_${{ github.ref_name }}_arm64.deb
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: t212_${{ github.ref_name }}_arm64.deb

  publish-apt:
    name: Publish to APT repository
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package

      - name: Check out source (for setup script)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: source
          sparse-checkout: scripts/setup-apt-repo.sh

      - name: Check out gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Update APT repository
        run: |
          mkdir -p gh-pages/apt/pool/main gh-pages/apt/dists/stable/main/binary-arm64
          cp t212_${{ github.ref_name }}_arm64.deb gh-pages/apt/pool/main/
          cp source/scripts/setup-apt-repo.sh gh-pages/apt/setup.sh

          cd gh-pages/apt

          # Generate Packages index
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          # Generate Release file
          cd dists/stable
          apt-ftparchive release \
            -o APT::FTPArchive::Release::Suite=stable \
            -o APT::FTPArchive::Release::Codename=stable \
            -o APT::FTPArchive::Release::Architectures=arm64 \
            . > Release

          # Sign Release
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "apt: publish t212 ${{ github.ref_name }}"
          git push
