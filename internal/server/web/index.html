<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T212 Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>T212 Dashboard</h1>
    <button id="refresh-all" class="btn-refresh" title="Refresh all history">&#x21bb; Refresh History</button>
    <span id="status" class="status disconnected">Connecting…</span>
    <span id="updated"></span>
  </header>
  <main>
    <p id="empty" class="empty hidden">No positions</p>
    <table id="positions" class="hidden">
      <thead>
        <tr>
          <th data-col="ticker">Ticker</th>
          <th></th>
          <th data-col="return">Return</th>
          <th data-col="returnPct">Return %</th>
          <th data-col="netRoi">Net ROI %</th>
          <th data-col="quantity">Quantity</th>
          <th data-col="currentPrice">Current Price</th>
          <th data-col="averagePrice">Avg Price</th>
          <th data-col="profitPerShare">Profit/Share</th>
          <th data-col="marketValue">Market Value</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>
  <script src="/app.js"></script>
</body>
</html>
