<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T212 Dashboard</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>T212 Dashboard</h1>
    <button id="refresh-all" class="btn-refresh" title="Refresh all history">&#x21bb; Refresh History</button>
    <span id="status" class="status disconnected">Connecting…</span>
    <span id="updated"></span>
  </header>
  <main>
    <div class="tabs">
      <button class="tab active" data-tab="active">Active Positions</button>
      <button class="tab" data-tab="closed">Closed Positions</button>
    </div>
    <div id="tab-active">
    <p id="empty" class="empty hidden">No positions</p>
    <table id="positions" class="hidden">
      <thead>
        <tr>
          <th>#</th>
          <th data-col="ticker">Ticker</th>
          <th data-col="name">Name</th>
          <th data-col="marketValue">Market Value</th>
          <th data-col="exchange">Exchange</th>
          <th></th>
          <th data-col="return">Return</th>
          <th data-col="returnPct">Return %</th>
          <th data-col="netRoi">Net ROI %</th>
          <th data-col="quantity">Quantity</th>
          <th data-col="currentPrice">Current Price</th>
          <th data-col="averagePrice">Avg Price</th>
          <th data-col="profitPerShare">Profit/Share</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
    </div>
    <div id="tab-closed" class="hidden">
    <p id="closed-empty" class="empty">No closed positions</p>
    <table id="closed-positions" class="hidden">
      <thead>
        <tr>
          <th>#</th>
          <th data-col-closed="ticker">Ticker</th>
          <th data-col-closed="name">Name</th>
          <th data-col-closed="exchange">Exchange</th>
          <th data-col-closed="return">Return</th>
          <th data-col-closed="returnPct">Return %</th>
        </tr>
      </thead>
      <tbody id="closed-tbody"></tbody>
      <tfoot id="closed-tfoot"></tfoot>
    </table>
    </div>
  </main>
  <script src="/app.js"></script>
</body>
</html>
